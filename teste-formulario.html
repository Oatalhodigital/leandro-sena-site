<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Formulário - Leandro Sena</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .form-test {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        .console-output {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="form-test">
        <h2>🧪 Teste do Formulário de Orçamento</h2>
        <p>Este formulário testa a integração com Firebase Firestore (coleção: orcamentos)</p>
        
        <form id="testForm">
            <input type="text" name="nome" placeholder="Nome completo" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="tel" name="whatsapp" placeholder="WhatsApp (DDD) 9XXXX-XXXX" required>
            <select name="objetivo" required>
                <option value="">Selecione o objetivo</option>
                <option value="estetica">Estética</option>
                <option value="design">Design</option>
                <option value="comercial">Comercial</option>
                <option value="site-pessoal">Site Pessoal</option>
                <option value="empresarial">Empresarial</option>
                <option value="outros">Outros</option>
            </select>
            <textarea name="descricao" placeholder="Descreva seu projeto..." rows="4" required></textarea>
            <button type="submit">🚀 Enviar Teste</button>
        </form>
        
        <div id="success" class="success">
            ✅ Sucesso! Dados salvos no Firebase. Verifique o console para detalhes.
        </div>
        
        <div id="error" class="error">
            ❌ Erro ao salvar. Verifique o console para detalhes.
        </div>
        
        <div class="console-output" id="console">
            Console de saída será exibido aqui...
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB07tis8vUZzDlaM2GDiROn-xmxXgHdVtQ",
            authDomain: "leandro-sena-web.firebaseapp.com",
            projectId: "leandro-sena-web",
            storageBucket: "leandro-sena-web.firebasestorage.app",
            messagingSenderId: "125091906843",
            appId: "1:125091906843:web:4ccd0c80f44487ab417fbe",
            measurementId: "G-KRQ7CRLCSM"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Console personalizado
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        const originalError = console.error;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleDiv.textContent += '[LOG] ' + args.join(' ') + '\n';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            consoleDiv.textContent += '[ERROR] ' + args.join(' ') + '\n';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        // Teste do formulário
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            console.log('🚀 Iniciando teste do formulário...');
            
            const formData = new FormData(this);
            const nome = formData.get('nome').trim();
            const email = formData.get('email').trim();
            const whatsapp = formData.get('whatsapp').trim();
            const objetivo = formData.get('objetivo').trim();
            const descricao = formData.get('descricao').trim();
            
            console.log('📝 Dados coletados:', { nome, email, whatsapp, objetivo, descricao });
            
            // Salvar no Firebase
            const leadData = {
                nome: nome,
                email: email,
                whatsapp: whatsapp,
                objetivo: objetivo,
                descricao: descricao,
                dataCriacao: firebase.firestore.FieldValue.serverTimestamp(),
                status: "teste",
                origem: "pagina_teste"
            };
            
            console.log('💾 Enviando para coleção "orcamentos"...');
            console.log('📦 Objeto a ser salvo:', JSON.stringify(leadData, null, 2));
            
            db.collection("orcamentos").add(leadData)
                .then(function(docRef) {
                    console.log('✅ Sucesso! Documento salvo com ID: ' + docRef.id);
                    document.getElementById('success').style.display = 'block';
                    document.getElementById('error').style.display = 'none';
                    document.getElementById('testForm').reset();
                    
                    // Testar WhatsApp
                    const objetivoMap = {
                        "estetica": "Estética",
                        "design": "Design", 
                        "comercial": "Comercial",
                        "site-pessoal": "Site Pessoal",
                        "empresarial": "Empresarial",
                        "outros": "Outros"
                    };
                    const objetivoLabel = objetivoMap[objetivo] || objetivo || "Não informado";
                    
                    const mensagem = "🚀 *Novo Lead Recebido!*\n\n" +
                        "👤 *Nome:* " + nome + "\n" +
                        "📱 *WhatsApp:* " + whatsapp + "\n" +
                        "🎯 *Objetivo:* " + objetivoLabel + "\n" +
                        "📝 *Problema:* " + descricao + "\n\n" +
                        "🔗 *Ação Necessária:* Entrar em contato em até 2 horas\n" +
                        "📅 *Próximo Passo:* Agendar reunião de diagnóstico";
                    
                    const whatsappUrl = "https://wa.me/5531982606442?text=" + encodeURIComponent(mensagem);
                    console.log('📱 Link WhatsApp gerado:', whatsappUrl);
                    console.log('📄 Mensagem formatada:', mensagem);
                })
                .catch(function(error) {
                    console.error('❌ Erro ao salvar no Firebase:', error);
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('success').style.display = 'none';
                });
        });
        
        console.log('🔥 Firebase inicializado com sucesso!');
        console.log('📂 Projeto: leandro-sena-web');
        console.log('💾 Coleção alvo: orcamentos');
        console.log('🧪 Página de teste carregada. Preencha o formulário para testar.');
    </script>
</body>
</html>
